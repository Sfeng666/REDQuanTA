# REDQuanTA Module 2 (Evaluate) Configuration - Full params for HTCondor
# Snakemake config for performance evaluation

# FST input options: "direct", "from_vcf", or "from_simulation"
fst_input_mode: "direct"

# Direct FST input (use full-size files for production)
fst_autosomes: "data/input/qst_neutral_autosomes.txt"
fst_chrX: "data/input/qst_neutral_chrX.txt"

# Evaluation parameters (FULL for HTCondor)
adaptive_qst_levels:
  - 0.50
  - 0.55
  - 0.60
  - 0.65
  - 0.70
  - 0.75
  - 0.80
  - 0.85
  - 0.90
  - 0.95
  - 1.00

ve_ratios:
  - 0.01
  - 0.1
  - 1.0
  - 10.0
  - 100.0

num_repeats: 10000       # Full evaluation
num_neutral: 10000       # Full neutral distribution
num_sim: 100000          # ABC simulations per estimation
batch_size: 1000         # Optimal batch size
threshold_percentile: 0.95

# Summary statistics combinations to evaluate
summary_stats_combos:
  - "QST,F_within_pop"
  - "QST,ratioVext"
  - "QST,ext_sd"
  - "QST"
  - "F_within_pop"
  - "ratioVext"

# Chromosome types
chromosomes:
  - "autosomes"
  - "chrX"

